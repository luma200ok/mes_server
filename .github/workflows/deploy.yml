name: MES Server CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 1. 빌드 & 테스트 ──────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (skip tests on PR)
        run: ./gradlew build ${{ github.event_name == 'pull_request' && '-x test' || '' }}

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  # ── 2. Blue-Green 배포 (main 브랜치 push 시만) ────────────────────
  deploy:
    name: Blue-Green Deploy
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./jar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "./jar/*.jar"
          target:   "/home/${{ secrets.EC2_USERNAME }}/mes-server/deploy"
          strip_components: 1

      - name: Blue-Green Switch
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/home/${{ secrets.EC2_USERNAME }}/mes-server"
            JAR_PATH="$DEPLOY_DIR/deploy/mes_server-0.0.1-SNAPSHOT.jar"
            mkdir -p $DEPLOY_DIR/logs

            # 현재 실행 중인 포트 확인 (Blue=8085, Green=8086)
            CURRENT_PORT=$(cat $DEPLOY_DIR/current_port 2>/dev/null || echo "8085")
            if [ "$CURRENT_PORT" = "8085" ]; then
              NEW_PORT=8086
            else
              NEW_PORT=8085
            fi

            echo "▶ 새 인스턴스 포트: $NEW_PORT (기존: $CURRENT_PORT)"

            # 새 포트로 앱 실행
            nohup java -jar \
              -Dspring.profiles.active=prod \
              -DSERVER_PORT=$NEW_PORT \
              -DDB_USERNAME=${{ secrets.DB_USERNAME }} \
              -DDB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -DJWT_SECRET=${{ secrets.JWT_SECRET }} \
              $JAR_PATH > $DEPLOY_DIR/logs/app-$NEW_PORT.log 2>&1 &

            # 헬스체크 (최대 60초 대기)
            echo "헬스체크 시작..."
            for i in $(seq 1 20); do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 3 --max-time 5 \
                http://localhost:$NEW_PORT/actuator/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ 새 인스턴스 정상 (포트: $NEW_PORT)"
                break
              fi
              echo "  대기 중... ($i/20)"
            done

            if [ "$STATUS" != "200" ]; then
              echo "❌ 헬스체크 실패 — 롤백"
              kill $(lsof -ti:$NEW_PORT) 2>/dev/null || true
              exit 1
            fi

            # Nginx upstream 전환
            sudo sed -i "s/localhost:[0-9]*/localhost:$NEW_PORT/" /etc/nginx/conf.d/mes.conf
            sudo nginx -t && sudo nginx -s reload
            echo "▶ Nginx → 포트 $NEW_PORT 전환 완료"

            # 기존 인스턴스 종료
            OLD_PID=$(lsof -ti:$CURRENT_PORT) || true
            if [ -n "$OLD_PID" ]; then
              kill $OLD_PID
              echo "▶ 기존 인스턴스(포트 $CURRENT_PORT) 종료"
            fi

            # 현재 포트 기록
            echo $NEW_PORT > $DEPLOY_DIR/current_port
            echo "🎉 Blue-Green 배포 완료 (active port: $NEW_PORT)"
