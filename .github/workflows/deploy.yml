name: MES Server CI/CD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'portfolio/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'portfolio/**'

jobs:
  # ── 1. 빌드 & 테스트 ──────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (skip tests on PR)
        run: ./gradlew build ${{ github.event_name == 'pull_request' && '-x test' || '' }}

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  # ── 2. React 빌드 ─────────────────────────────────────────────────
  build-client:
    name: Build React Client
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build React app
        working-directory: client
        run: npm run build

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 1

  # ── 3. Blue-Green 배포 (main 브랜치 push 시만) ────────────────────
  deploy:
    name: Blue-Green Deploy
    needs: [ build, build-client ]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./jar

      - name: Download client artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: ./client-dist

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "./jar/*.jar"
          target:   "/home/${{ secrets.EC2_USERNAME }}/mes-server/deploy"
          strip_components: 1

      - name: Copy React build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "./client-dist/*"
          target:   "/tmp/mes-client-dist"
          strip_components: 1

      - name: Checkout (for simulator)
        uses: actions/checkout@v4

      - name: Copy simulator to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "simulator/simulate.py"
          target:   "/home/${{ secrets.EC2_USERNAME }}/mes-server"
          strip_components: 1

      - name: Blue-Green Switch & Deploy Client
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/home/${{ secrets.EC2_USERNAME }}/mes-server"
            JAR_PATH=$(find $DEPLOY_DIR/deploy/ -name "*.jar" ! -name "*plain*" | head -1)
            if [ -z "$JAR_PATH" ]; then echo "❌ JAR 파일 없음"; exit 1; fi
            echo "▶ 실행 JAR: $JAR_PATH"
            mkdir -p $DEPLOY_DIR/logs

            # 현재 실행 중인 포트 확인 (Blue=8085, Green=8086)
            CURRENT_PORT=$(cat $DEPLOY_DIR/current_port 2>/dev/null || echo "8085")
            if [ "$CURRENT_PORT" = "8085" ]; then
              NEW_PORT=8086
            else
              NEW_PORT=8085
            fi

            echo "▶ 새 인스턴스 포트: $NEW_PORT (기존: $CURRENT_PORT)"

            # 새 포트로 앱 실행 (환경변수로 전달 → ps aux에 비밀값 노출 방지)
            nohup env \
              SERVER_PORT=$NEW_PORT \
              DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              DISCORD_WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}" \
              java -jar -Dspring.profiles.active=prod \
              $JAR_PATH > $DEPLOY_DIR/logs/app-$NEW_PORT.log 2>&1 &

            # 헬스체크 (최대 90초 대기)
            echo "헬스체크 시작..."
            STATUS="000"
            for i in $(seq 1 30); do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 3 --max-time 5 \
                http://localhost:$NEW_PORT/actuator/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ 새 인스턴스 정상 (포트: $NEW_PORT)"
                break
              fi
              echo "  대기 중... ($i/30, status=$STATUS)"
            done

            if [ "$STATUS" != "200" ]; then
              echo "❌ 헬스체크 실패 — 앱 로그:"
              tail -50 $DEPLOY_DIR/logs/app-$NEW_PORT.log || true
              kill $(lsof -ti:$NEW_PORT) 2>/dev/null || true
              exit 1
            fi

            # React 빌드 파일 배포
            sudo rm -rf /var/www/mes-client/*
            sudo cp -r /tmp/mes-client-dist/* /var/www/mes-client/
            sudo chown -R www-data:www-data /var/www/mes-client/ 2>/dev/null || true
            rm -rf /tmp/mes-client-dist
            echo "▶ React 클라이언트 배포 완료"

            # Nginx upstream 전환
            sudo sed -i "s/localhost:[0-9]*/localhost:$NEW_PORT/" /etc/nginx/conf.d/mes.conf
            sudo nginx -t && sudo nginx -s reload
            echo "▶ Nginx → 포트 $NEW_PORT 전환 완료"

            # 기존 인스턴스 종료
            OLD_PID=$(lsof -ti:$CURRENT_PORT) || true
            if [ -n "$OLD_PID" ]; then
              kill $OLD_PID
              echo "▶ 기존 인스턴스(포트 $CURRENT_PORT) 종료"
            fi

            # 현재 포트 기록
            echo $NEW_PORT > $DEPLOY_DIR/current_port

            # 시뮬레이터 의존성 설치 및 systemd 서비스 등록
            pip3 install requests --quiet
            printf '[Unit]\nDescription=MES Sensor Simulator\nAfter=network.target\n\n[Service]\nType=simple\nUser=${{ secrets.EC2_USERNAME }}\nWorkingDirectory=/home/${{ secrets.EC2_USERNAME }}/mes-server\nExecStart=/usr/bin/python3 /home/${{ secrets.EC2_USERNAME }}/mes-server/simulate.py\nRestart=always\nRestartSec=5\nEnvironment=MES_BASE_URL=http://localhost:%s\n\n[Install]\nWantedBy=multi-user.target\n' "$NEW_PORT" | sudo tee /etc/systemd/system/mes-simulator.service > /dev/null
            sudo systemctl daemon-reload
            sudo systemctl enable mes-simulator
            sudo systemctl restart mes-simulator
            echo "▶ 시뮬레이터 서비스 시작 완료"

            echo "🎉 배포 완료 (active port: $NEW_PORT)"
