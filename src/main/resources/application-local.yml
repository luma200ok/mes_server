spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mes_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 6000ms

jwt:
  secret: mes-local-dev-only-secret-key-do-not-use-in-production-256bit

logging:
  level:
    com.mes: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
