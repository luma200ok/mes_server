spring:
  profiles:
    active: local
  application:
    name: mes_server

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  cache:
    type: redis

  thymeleaf:
    cache: false

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:mes-secret-key-for-development-only-change-in-production-256bit}
  expiration: 86400000  # 24시간 (ms)

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
