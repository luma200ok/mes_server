spring:
  profiles:
    active: local
  application:
    name: mes_server
  jackson:
    time-zone: Asia/Seoul

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  cache:
    type: redis

  thymeleaf:
    cache: false

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

jwt:
  # JWT 서명 시크릿 키 (필수)
  secret: ${JWT_SECRET}
  # 토큰 만료시간 (ms) — 기본 24시간
  expiration: 86400000

discord:
  # Discord 알림 웹훅 URL (미설정 시 알림 비활성)
  webhook-url: ${DISCORD_WEBHOOK_URL:}

mes:
  sensor:
    # Redis 센서 데이터 TTL (초)
    ttl-seconds: ${MES_SENSOR_TTL_SECONDS:60}
    # Redis→MySQL 집계 주기 (ms)
    aggregation-delay-ms: ${MES_SENSOR_AGGREGATION_DELAY_MS:60000}
    # 센서 데이터 수신 API Key (시뮬레이터와 공유)
    api-key: ${MES_SENSOR_API_KEY:mes-sensor-local-key}
  sse:
    # SSE 연결 타임아웃 (ms) — 기본 30분
    timeout-ms: ${MES_SSE_TIMEOUT_MS:1800000}
  discord:
    # Discord 알림 중복 발송 억제 시간 (분)
    alarm-cooldown-minutes: ${MES_DISCORD_ALARM_COOLDOWN_MINUTES:1}
  cleanup:
    # SensorHistory 하드 삭제 보관 기간 (일)
    retention-days: ${MES_CLEANUP_RETENTION_DAYS:30}
    # 삭제 설비 관련 이력 소프트 삭제 cron
    soft-delete-cron: ${MES_CLEANUP_SOFT_DELETE_CRON:0 0 2 * * *}
    # 보관 기간 초과 이력 하드 삭제 cron
    hard-delete-cron: ${MES_CLEANUP_HARD_DELETE_CRON:0 0 3 * * *}
  workorder:
    # 생산 1단위로 카운팅하는 최소 간격 (초) — 시간당 40개 기준 90초
    production-interval-seconds: ${MES_WORKORDER_PRODUCTION_INTERVAL_SECONDS:90}
    auto-create:
      # 작업지시 자동 생성 주기 cron — 기본 매일 자정
      cron: ${MES_WORKORDER_AUTO_CREATE_CRON:0 0 0 * * *}
      # 자동 생성 시 설비당 계획 수량 (시간당 40개 × 24시간 ≈ 1,000개/일)
      planned-qty: ${MES_WORKORDER_AUTO_CREATE_QTY:1000}
  oee:
    # OEE 계산 기준 일일 계획 가동 시간 (시간)
    planned-operation-hours: ${MES_OEE_PLANNED_HOURS:8.0}
  cache:
    # Spring Cache (Redis) TTL (분)
    ttl-minutes: ${MES_CACHE_TTL_MINUTES:10}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
